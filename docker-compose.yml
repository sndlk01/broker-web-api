services:
  api:
    container_name: broker-web-api
    build:
      context: .
      target: production
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      - db

  db:
    container_name: broker-db
    image: postgres:latest
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
volumes:
  postgres_data:
